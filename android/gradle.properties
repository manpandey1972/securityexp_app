org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Tell Gradle's toolchain resolver where to find JDK 17 (required by
# flutter_callkit_incoming). Auto-detection misses Homebrew's openjdk@17 on
# macOS because it isn't symlinked into /Library/Java/JavaVirtualMachines.
org.gradle.java.installations.paths=/opt/homebrew/opt/openjdk@17/libexec/openjdk.jdk/Contents/Home
org.gradle.java.installations.auto-detect=true
